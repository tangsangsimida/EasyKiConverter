# GitHub Actions Labeler 配置文件
# 根据修改的文件路径自动为 Pull Request 分配标签
#
# v5 格式文档: https://github.com/actions/labeler

# 文档相关
docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**/*
          - README*.md
          - CHANGELOG*.md
          - LICENSE
          - AGENTS.md
          - GEMINI.md

# 核心转换引擎
core:
  - changed-files:
      - any-glob-to-any-file:
          - src/core/**/*

# 数据模型
models:
  - changed-files:
      - any-glob-to-any-file:
          - src/models/**/*

# 服务层
services:
  - changed-files:
      - any-glob-to-any-file:
          - src/services/**/*

# UI 层
ui:
  - changed-files:
      - any-glob-to-any-file:
          - src/ui/**/*

# 工作线程
workers:
  - changed-files:
      - any-glob-to-any-file:
          - src/workers/**/*

# 工具类
utils:
  - changed-files:
      - any-glob-to-any-file:
          - src/utils/**/*

# 测试
tests:
  - changed-files:
      - any-glob-to-any-file:
          - tests/**/*

# CI/CD
ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/**/*
          - CMakeLists.txt
          - .gitignore

# 资源文件
resources:
  - changed-files:
      - any-glob-to-any-file:
          - resources/**/*
