# GitHub Labels 配置文件
# 中英文双语标签体系

# ============================================
# 类型标签 (Type Labels)
# ============================================

- name: "bug / 缺陷"
  color: "d73a4a"
  description: "Something isn't working / 功能异常"

- name: "feature / 新功能"
  color: "0e8a16"
  description: "New feature request / 新功能请求"

- name: "enhancement / 功能增强"
  color: "1d76db"
  description: "Improve existing functionality / 改进现有功能"

- name: "docs / 文档"
  color: "0075ca"
  description: "Documentation improvements / 文档改进"

- name: "refactor / 重构"
  color: "e4e669"
  description: "Code refactoring / 代码重构"

- name: "test / 测试"
  color: "d876e3"
  description: "Testing related / 测试相关"

- name: "ci / 持续集成"
  color: "fda67a"
  description: "CI/CD workflows / 持续集成工作流"

- name: "build / 构建"
  color: "a6c28c"
  description: "Build configuration / 构建配置"

- name: "deps / 依赖"
  color: "2ae51d"
  description: "Dependency updates / 依赖更新"

- name: "performance / 性能"
  color: "fbca04"
  description: "Performance optimization / 性能优化"

# ============================================
# 模块标签 (Module Labels)
# ============================================

- name: "core / 核心"
  color: "b60205"
  description: "Core conversion engine / 核心转换引擎"

- name: "easyeda / 嘉立创"
  color: "0b641b"
  description: "EasyEDA module / EasyEDA 模块"

- name: "kicad / KiCad"
  color: "e3621f"
  description: "KiCad export module / KiCad 导出模块"

- name: "ui / 界面"
  color: "f2347e"
  description: "User interface / 用户界面"

- name: "network / 网络"
  color: "1d76db"
  description: "Network client / 网络客户端"

- name: "services / 服务"
  color: "76611c"
  description: "Service layer / 服务层"

- name: "workers / 工作线程"
  color: "b5a4fa"
  description: "Background workers / 后台工作线程"

- name: "cli / 命令行"
  color: "ededed"
  description: "Command line interface / 命令行工具"

- name: "models / 数据模型"
  color: "0e28c6"
  description: "Data models / 数据模型"

- name: "resources / 资源"
  color: "fe81f4"
  description: "Icons, images, QML / 图标、图片、QML"

# ============================================
# 状态标签 (Status Labels)
# ============================================

- name: "good first issue / 新手友好"
  color: "7057ff"
  description: "Good for newcomers / 适合新手参与"

- name: "help wanted / 寻求帮助"
  color: "008672"
  description: "Extra attention is needed / 需要社区帮助"

- name: "wontfix / 不修复"
  color: "ffffff"
  description: "Will not be worked on / 不予修复"

- name: "duplicate / 重复"
  color: "cfd3d7"
  description: "Already exists / 重复问题"

- name: "invalid / 无效"
  color: "e4e669"
  description: "Not valid / 无效问题"

- name: "question / 提问"
  color: "d876e3"
  description: "Further information needed / 需要更多信息"

- name: "priority: high / 高优先级"
  color: "b60205"
  description: "High priority issue / 高优先级问题"

- name: "priority: medium / 中优先级"
  color: "fbca04"
  description: "Medium priority / 中优先级"

- name: "priority: low / 低优先级"
  color: "0e8a16"
  description: "Low priority / 低优先级"

- name: "status: in progress / 进行中"
  color: "1d76db"
  description: "Currently being worked on / 正在处理"

- name: "status: blocked / 阻塞"
  color: "d73a4a"
  description: "Blocked by something / 被阻塞"

- name: "status: ready for review / 待审核"
  color: "7057ff"
  description: "Ready for code review / 等待代码审核"
