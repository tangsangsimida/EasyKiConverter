name: 'Automated Issue Triage'

on:
  issues:
    types:
      - 'opened'
      - 'reopened'
  issue_comment:
    types:
      - 'created'
  workflow_dispatch:
    inputs:
      issue_number:
        description: '要分类的 Issue 编号'
        required: true
        type: number

concurrency:
  group: '${{ github.workflow }}-${{ github.event.issue.number || inputs.issue_number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read
  issues: write
  statuses: write

jobs:
  triage-issue:
    if: |-
      github.event_name == 'issues' ||
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@iflow-cli /triage') &&
        contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set issue context
        id: issue_context
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            ISSUE_DATA=$(gh api repos/${{ github.repository }}/issues/${{ inputs.issue_number }} --jq '{title: .title, body: .body}')
            echo "title=$(echo "$ISSUE_DATA" | jq -r '.title // ""')" >> "$GITHUB_OUTPUT"
            echo "body=$(echo "$ISSUE_DATA" | jq -r '.body // ""')" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "title=${{ github.event.issue.title }}" >> "$GITHUB_OUTPUT"
            echo "body=${{ github.event.issue.body }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get available labels
        id: labels
        run: |
          LABELS=$(gh label list --json name --jq '.[].name')
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"

      - name: Run MiniMax AI Issue Triage
        id: triage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.issue_context.outputs.title }}
          ISSUE_BODY: ${{ steps.issue_context.outputs.body }}
          ISSUE_NUMBER: ${{ steps.issue_context.outputs.number }}
          LABELS: ${{ steps.labels.outputs.labels }}
        run: |
          set -euo pipefail

          PROMPT="## 角色
          你是一个专业的 GitHub Issue 分类助手。请用中文思考，并严格按照以下步骤操作。

          ## 任务目标
          分析当前 Issue 的标题和内容，为其打上最合适的现有标签（仅限仓库中已存在的标签）。
          仓库可用标签: ${LABELS}
          标签格式应为：kind/*（如 kind/bug）、priority/*（如 priority/p1）等。

          ## Issue 信息
          标题: ${ISSUE_TITLE}
          内容: ${ISSUE_BODY}

          ## 输出要求
          仅输出一行JSON格式的标签列表，格式如下：
          {\"labels\": [\"label1\", \"label2\"]}
          不要添加任何解释，仅输出JSON。"

          RESPONSE=$(curl -s https://api.minimaxi.com/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.MINIMAX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"MiniMax-M2.7\",
              \"messages\": [{\"role\": \"user\", \"content\": \"${PROMPT}\"}],
              \"max_tokens\": 500
            }")

          echo "Response: ${RESPONSE}"

          LABELS_OUTPUT=$(echo "${RESPONSE}" | jq -r '.choices[0].message.content // empty')

          if [ -z "${LABELS_OUTPUT}" ]; then
            echo "Failed to get response from MiniMax API"
            exit 1
          fi

          LABEL_ARRAY=$(echo "${LABELS_OUTPUT}" | jq -r '.labels[]' 2>/dev/null || echo "")

          if [ -n "${LABEL_ARRAY}" ]; then
            LABEL_LIST=$(echo "${LABEL_ARRAY}" | tr '\n' ',' | sed 's/,$//')
            echo "Applying labels: ${LABEL_LIST}"
            gh issue edit "${ISSUE_NUMBER}" --add-label "${LABEL_LIST}" 2>/dev/null || true
          fi

          gh issue edit "${ISSUE_NUMBER}" --remove-label "status/needs-triage" 2>/dev/null || true

          echo "triage_result=success" >> "$GITHUB_OUTPUT"

      - name: Post Success Comment (Optional)
        if: success() && (github.event_name != 'issues')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = ${{ steps.issue_context.outputs.number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: '✅ Issue 已成功完成自动分类！相关标签已应用。'
            });

      - name: Post Failure Comment
        if: failure() && steps.triage.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = ${{ steps.issue_context.outputs.number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `❌ 自动分类失败。\n\n请查看 [Action 运行日志](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) 以排查问题。\n\n常见原因：\n- 仓库中缺少必要的标签（如 kind/bug）\n- MINIMAX_API_KEY 无效或配额不足\n- 模型临时不可用`
            });
