name: Build

on:
  push:
    branches: ['master', 'ci_test']
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: ['master', 'dev', 'ci_test']
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  packages: read

env:
  BUILD_TYPE: RelWithDebInfo
  QT_VERSION: '6.10.2'
  CMAKE_VERSION: '3.22'

jobs:
  linux-build:
    name: 'Build Linux'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 'Checkout Source code'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Fix Git Safe Directory'
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: 'Get Version'
        id: version
        uses: ./.github/actions/get-version

      - name: 'Export Version'
        run: |
          echo "VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_ENV

      - name: 'Install System Dependencies'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libtiff-dev \
            ccache \
            ninja-build

      - name: 'Setup CCache'
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ${{ runner.os }}-linux-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            ${{ runner.os }}-linux-
          max-size: '2G'

      - name: 'Install Qt 6.10.2'
        run: |
          pip3 install --no-cache-dir --break-system-packages aqtinstall
          aqt install-qt linux desktop 6.10.2 linux_gcc_64 --outputdir /opt/qt --modules qtshadertools qtimageformats
          echo "/opt/qt/6.10.2/gcc_64/bin" >> $GITHUB_PATH
          echo "Qt6_DIR=/opt/qt/6.10.2/gcc_64/lib/cmake/Qt6" >> $GITHUB_ENV

      - name: 'Clone QXlsx'
        run: |
          git clone --depth 1 https://github.com/QtExcel/QXlsx.git /opt/QXlsx
          echo "QXLSX_ROOT=/opt/QXlsx/QXlsx" >> $GITHUB_ENV

      - name: 'Configure CMake'
        run: |
          export QT_QML_DISABLE_AOT_COMPILE=1
          export QML_DISABLE_DISK_CACHE=1
          cmake -B build -G "Ninja" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF \
            -DEASYKICONVERTER_BUILD_TESTS=ON \
            -DVERSION_FROM_CI=${{ env.VERSION }}

      - name: 'Build'
        run: |
          export QT_QML_DISABLE_AOT_COMPILE=1
          cmake --build build --config RelWithDebInfo --parallel 4

      - name: 'CCache Stats'
        run: |
          ccache -sv
          echo "## CCache Statistics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 'Build Statistics'
        if: always()
        run: |
          echo "## Build Statistics (Linux)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build dir size | $(du -sh build/ 2>/dev/null | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Free disk | $(df -h . | tail -1 | awk '{print $4}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Memory used | $(free -h 2>/dev/null | awk '/^Mem:/ {print $3 "/" $2}' || echo N/A) |" >> $GITHUB_STEP_SUMMARY

      - name: 'Run Tests'
        run: |
          export QT_QPA_PLATFORM=offscreen
          ctest --test-dir build -C RelWithDebInfo --output-on-failure --no-tests=error


  windows-build:
    name: 'Build Windows'
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      WindowsSDKVersion: '10.0.22621.0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'Windows MSVC'
            platform: 'msvc2019_64'
            generator: 'Ninja'
            arch: 'x64'
    steps:
      - name: 'Checkout Source code'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Setup MSVC'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
          toolset: '14.2'

      - name: 'Setup vcpkg'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'
          runVcpkgInstall: true

      - name: 'Setup Build Environment (MSVC)'
        uses: ./.github/actions/setup-env
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}
          qt-version: ${{ env.QT_VERSION }}
          qt-host: 'windows'
          qt-target: 'desktop'
          qt-arch: 'win64_msvc2022_64'
          enable-ccache: 'false'
          enable-sccache: 'false'

      - name: 'Install Ninja'
        run: choco install ninja -y --no-progress

      - name: 'Install ccache'
        run: choco install ccache -y --no-progress

      - name: 'Setup CCache Cache'
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: Windows-ccache-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}
          restore-keys: |
            Windows-ccache-
          max-size: '2G'

      - name: 'Configure CMake (Ninja + ccache) with vcpkg'
        run: |
          cmake -B build -G "Ninja" `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR" `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_C_COMPILER_LAUNCHER=ccache `
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
            -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF `
            -DEASYKICONVERTER_BUILD_TESTS=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCI=ON

      - name: 'Build'
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 16

      - name: 'CCache Stats'
        run: |
          ccache -sv
          echo "## CCache Statistics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 'Build Statistics'
        if: always()
        shell: pwsh
        run: |
          $buildSize = if (Test-Path build) { (Get-ChildItem -Path build -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB } else { 0 }
          $freeDisk = [math]::Round((Get-PSDrive -Name (Get-Location).Drive.Name).Free / 1GB, 1)
          "## Build Statistics (Windows)" >> $env:GITHUB_STEP_SUMMARY
          "" >> $env:GITHUB_STEP_SUMMARY
          "| Metric | Value |" >> $env:GITHUB_STEP_SUMMARY
          "|--------|-------|" >> $env:GITHUB_STEP_SUMMARY
          "| Build dir size | $([math]::Round($buildSize, 1)) MB |" >> $env:GITHUB_STEP_SUMMARY
          "| Free disk | ${freeDisk} GB |" >> $env:GITHUB_STEP_SUMMARY

      - name: 'Run Tests'
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          ctest --test-dir build -C ${{ env.BUILD_TYPE }} --output-on-failure --no-tests=error

  macos-build:
    name: 'Build macOS'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'macOS ARM64'
            os: macos-14
          - name: 'macOS Intel'
            os: macos-15
    steps:
      - name: 'Checkout Source code'
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 'Setup Build Environment'
        uses: ./.github/actions/setup-env
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}
          qt-version: ${{ env.QT_VERSION }}
          qt-host: 'mac'
          qt-target: 'desktop'
          enable-ccache: 'true'
          enable-sccache: 'false'

      - name: 'Configure CMake with CCache'
        run: |
          cmake -B build \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF \
            -DEASYKICONVERTER_BUILD_TESTS=ON \
            -DCI=ON

      - name: 'Build'
        run: |
          cmake --build build --config $BUILD_TYPE --parallel 4

      - name: 'CCache Stats'
        run: |
          ccache -sv
          echo "## CCache Statistics" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ccache -s >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 'Build Statistics'
        if: always()
        run: |
          echo "## Build Statistics (macOS)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build dir size | $(du -sh build/ 2>/dev/null | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "| Free disk | $(df -h . | tail -1 | awk '{print $4}') |" >> $GITHUB_STEP_SUMMARY
          echo "| Memory pressure | $(vm_stat 2>/dev/null | awk '/Pages free/ {free=$NF} /Pages active/ {active=$NF} END {printf "free=%d active=%d", free, active}' || echo N/A) |" >> $GITHUB_STEP_SUMMARY

      - name: 'Run Tests'
        run: |
          export QT_QPA_PLATFORM=offscreen
          ctest --test-dir build -C $BUILD_TYPE --output-on-failure --no-tests=error

