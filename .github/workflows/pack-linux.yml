name: Packaging (Linux)

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

env:
  PRODUCT: EasyKiConverter
  DOCKER_IMAGE: ghcr.io/tangsangsimida/easykiconverter/build-env:latest

jobs:
  # ===========================================================================
  # 阶段 1: 核心构建 (Build Once)
  # 编译代码，处理依赖，生成 AppDir 目录结构，供后续打包任务使用
  # ===========================================================================
  build-core:
    name: 'Build Core (Compile & Prepare)'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        uses: ./.github/actions/get-version

      - name: Export Version
        run: |
          echo "VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_ENV
          echo "GIT_HASH=${{ steps.version.outputs.GIT_HASH }}" >> $GITHUB_ENV

      - name: Fix Git Safe Directory
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            ccache

      - name: Install Qt 6.10.2
        run: |
          QT_VERSION="6.10.2"
          pip3 install --no-cache-dir --break-system-packages aqtinstall
          aqt install-qt linux desktop $QT_VERSION linux_gcc_64 --outputdir /opt/qt --modules qtshadertools qtimageformats
          echo "/opt/qt/$QT_VERSION/gcc_64/bin" >> $GITHUB_PATH
          echo "Qt6_DIR=/opt/qt/$QT_VERSION/gcc_64/lib/cmake/Qt6" >> $GITHUB_ENV

      - name: Install QXlsx
        run: |
          git clone https://github.com/QtExcel/QXlsx.git /opt/QXlsx
          echo "QXLSX_ROOT=/opt/QXlsx/QXlsx" >> $GITHUB_ENV

      - name: Install LinuxDeploy
        run: |
          # 创建目标目录
          sudo mkdir -p /opt/linuxdeploy /opt/linuxdeploy-plugin-qt
          
          # 安装 linuxdeploy
          wget -q -O /tmp/linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x /tmp/linuxdeploy
          /tmp/linuxdeploy --appimage-extract
          sudo cp -r squashfs-root/* /opt/linuxdeploy/
          sudo ln -sf /opt/linuxdeploy/AppRun /usr/local/bin/linuxdeploy
          
          # 安装 linuxdeploy Qt 插件
          wget -q -O /tmp/linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x /tmp/linuxdeploy-plugin-qt
          /tmp/linuxdeploy-plugin-qt --appimage-extract
          sudo cp -r squashfs-root/* /opt/linuxdeploy-plugin-qt/
          sudo ln -sf /opt/linuxdeploy-plugin-qt/AppRun /usr/local/bin/linuxdeploy-plugin-qt
          
          # 验证安装
          which linuxdeploy || echo "ERROR: linuxdeploy not found"
          /opt/linuxdeploy/AppRun --version || echo "ERROR: linuxdeploy not executable"
          
          # 设置环境变量
          echo "/opt/linuxdeploy" >> $GITHUB_PATH
          echo "/opt/linuxdeploy-plugin-qt" >> $GITHUB_PATH
          echo "DEPLOY_MODE=unpackaged" >> $GITHUB_ENV

      - name: Remove Unused Qt Plugins
        run: |
          echo ""
          echo "=============================================="
          echo "  Qt Plugins Inventory (before cleanup)"
          echo "=============================================="
          QT_PLUGINS_DIR="/opt/qt/6.10.2/gcc_64/plugins"
          if [ -d "$QT_PLUGINS_DIR" ]; then
            for plugin_type in "$QT_PLUGINS_DIR"/*/; do
              plugin_name=$(basename "$plugin_type")
              echo ""
              echo ">>> [$plugin_name]"
              ls -la "$plugin_type" 2>/dev/null | grep -v "^total" | head -20 || echo "(empty)"
            done
          fi
          echo ""
          echo "=============================================="
          echo "  Cleaning up unused plugins..."
          echo "=============================================="
          
          # 删除所有 Qt SQL 驱动
          for qt_lib_dir in /opt/qt/*/gcc_64/plugins/sqldrivers; do
            if [ -d "$qt_lib_dir" ]; then
              echo "检查 SQL 驱动目录: $qt_lib_dir"
              ls -la "$qt_lib_dir" 2>/dev/null || true
              rm -f "$qt_lib_dir"/libqsql*.so* 2>/dev/null || true
              echo "[-] 已删除所有 SQL 驱动"
            fi
          done
          
          echo ""
          echo "=============================================="
          echo "  Qt Plugins Inventory (after cleanup)"
          echo "=============================================="
          if [ -d "$QT_PLUGINS_DIR" ]; then
            for plugin_type in "$QT_PLUGINS_DIR"/*/; do
              plugin_name=$(basename "$plugin_type")
              echo ""
              echo ">>> [$plugin_name]"
              ls -la "$plugin_type" 2>/dev/null | grep -v "^total" | head -20 || echo "(empty)"
            done
          fi
          echo ""
          echo "=============================================="
          echo "  Cleanup complete!"
          echo "=============================================="

      - name: Configure CMake
        run: |
          # 禁用 QML AOT 编译以减少内存使用
          export QT_QML_DISABLE_AOT_COMPILE=1
          export QML_DISABLE_DISK_CACHE=1
          
          cmake -B build -G "Ninja" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF \
            -DVERSION_FROM_CI=${{ env.VERSION }}

      - name: Compile & Install
        run: |
          set -x
          APPIMAGE_DST_PATH=$GITHUB_WORKSPACE/${PRODUCT}.AppDir
          mkdir -p ${APPIMAGE_DST_PATH}

          # 禁用 QML AOT 编译以减少内存使用
          export QT_QML_DISABLE_AOT_COMPILE=1
          export QML_DISABLE_DISK_CACHE=1

          # 使用多核编译
          cmake --build build --config RelWithDebInfo --parallel 4
          cmake --install build --prefix ${APPIMAGE_DST_PATH}/usr
          rm -rf ${APPIMAGE_DST_PATH}/usr/include

          # 确保可执行文件有执行权限
          chmod +x ${APPIMAGE_DST_PATH}/usr/bin/easykiconverter
          find ${APPIMAGE_DST_PATH}/usr/bin -type f -exec chmod +x {} \; 2>/dev/null || true
          find ${APPIMAGE_DST_PATH}/usr/libexec -type f -exec chmod +x {} \; 2>/dev/null || true

          # 配置元数据
          cat > ${APPIMAGE_DST_PATH}/io.github.tangsangsimida.easykiconverter.desktop <<EOF
          [Desktop Entry]
          Type=Application
          Name=EasyKiConverter
          Name[zh_CN]=EasyKiConverter
          Comment=Convert LCSC and EasyEDA components to KiCad libraries
          Comment[zh_CN]=将嘉立创和 EasyEDA 元件转换为 KiCad 库
          Exec=AppRun %F
          Icon=io.github.tangsangsimida.easykiconverter
          Terminal=false
          Categories=Development;Electronics;Engineering;
          Keywords=KiCad;LCSC;EasyEDA;Component;Converter;Electronics;
          StartupNotify=true
          StartupWMClass=easykiconverter
          MimeType=application/vnd.easyeda+json;
          EOF

          # 复制图标到 AppDir 根目录（使用 256x256 尺寸，确保任务栏显示正常）
          cp resources/icons/hicolor/256x256/apps/io.github.tangsangsimida.easykiconverter.png ${APPIMAGE_DST_PATH}/io.github.tangsangsimida.easykiconverter.png

          # 安装 hicolor 图标到 AppDir（确保所有尺寸的图标都可用）
          for size in 16 24 32 48 64 128 256 512; do
            mkdir -p ${APPIMAGE_DST_PATH}/usr/share/icons/hicolor/${size}x${size}/apps
            cp resources/icons/hicolor/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png \
               ${APPIMAGE_DST_PATH}/usr/share/icons/hicolor/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png
          done

          # 安装 hicolor-dark 图标到 AppDir（暗色主题）
          if [ -d "resources/icons/hicolor-dark" ]; then
            echo "安装暗色主题图标..."
            for size in 16 24 32 48 64 128 256 512; do
              if [ -f "resources/icons/hicolor-dark/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png" ]; then
                mkdir -p ${APPIMAGE_DST_PATH}/usr/share/icons/hicolor-dark/${size}x${size}/apps
                cp resources/icons/hicolor-dark/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png \
                   ${APPIMAGE_DST_PATH}/usr/share/icons/hicolor-dark/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png
              fi
            done
            echo "✓ 暗色主题图标已安装"
          else
            echo "WARNING: hicolor-dark 目录不存在，跳过暗色主题图标"
          fi

          # 设置 LD_LIBRARY_PATH 让 linuxdeploy 能够找到 Qt 库
          export LD_LIBRARY_PATH="/opt/qt/6.10.2/gcc_64/lib:$LD_LIBRARY_PATH"

          # 关键步骤：运行 linuxdeploy 填充依赖库 (Qt libs 等) 到 AppDir
          # 注意：这里不生成 AppImage 文件，只处理目录内容
          # --icon-file 参数必须指向 AppDir 中的图标文件，而不是源路径
          /opt/linuxdeploy/AppRun --appdir ${APPIMAGE_DST_PATH} --plugin qt \
            --executable ${APPIMAGE_DST_PATH}/usr/bin/easykiconverter \
            --desktop-file ${APPIMAGE_DST_PATH}/io.github.tangsangsimida.easykiconverter.desktop \
            --icon-file ${APPIMAGE_DST_PATH}/io.github.tangsangsimida.easykiconverter.png

          # 修复图标文件（linuxdeploy 可能创建了符号链接，替换为实际文件）
          if [ -L "${APPIMAGE_DST_PATH}/io.github.tangsangsimida.easykiconverter.png" ]; then
            rm -f ${APPIMAGE_DST_PATH}/io.github.tangsangsimida.easykiconverter.png
            cp ${APPIMAGE_DST_PATH}/usr/share/icons/hicolor/256x256/apps/io.github.tangsangsimida.easykiconverter.png \
               ${APPIMAGE_DST_PATH}/io.github.tangsangsimida.easykiconverter.png
          fi
          
          # 修复：设置库文件权限（确保动态链接器能够正确加载）
          echo "设置库文件权限..."
          find ${APPIMAGE_DST_PATH}/usr/lib -name "*.so*" -type f -exec chmod +x {} \; 2>/dev/null || true
          echo "✓ 库文件权限设置完成"
          
          # 复制 QML 模块到 AppDir（使用 qmake 动态获取路径）
          QML_FOUND=false
          QT_INSTALL_QML=$(qmake -query QT_INSTALL_QML 2>/dev/null || echo "")
          if [ -n "$QT_INSTALL_QML" ] && [ -d "$QT_INSTALL_QML" ]; then
            echo "Found QML directory via qmake: $QT_INSTALL_QML"
            rm -rf ${APPIMAGE_DST_PATH}/usr/qml
            mkdir -p ${APPIMAGE_DST_PATH}/usr/qml
            
            # 使用 rsync 保留符号链接和权限
            rsync -a --copy-links "$QT_INSTALL_QML"/ ${APPIMAGE_DST_PATH}/usr/qml/
            
            # 修复：创建插件符号链接（Qt 6 使用 lib 前缀，但 qmldir 引用无前缀名称）
            echo "Creating QML plugin symlinks..."
            find ${APPIMAGE_DST_PATH}/usr/qml -name "lib*.so" -type f | while read libfile; do
              plugin_name=$(basename "$libfile" | sed 's/^lib//')
              plugin_dir=$(dirname "$libfile")
              
              # 删除已存在的实际文件（保留符号链接）
              if [ -f "$plugin_dir/$plugin_name" ] && [ ! -L "$plugin_dir/$plugin_name" ]; then
                rm -f "$plugin_dir/$plugin_name"
              fi
              
              # 创建符号链接（覆盖已存在的符号链接）
              ln -sf "$(basename "$libfile")" "$plugin_dir/$plugin_name"
            done
            echo "✓ QML plugin symlinks created"
            
            # 使用 qmake 获取 Qt 库目录
            QT_LIBS=$(qmake -query QT_INSTALL_LIBS 2>/dev/null || echo "")
            if [ -n "$QT_LIBS" ] && [ -d "$QT_LIBS" ]; then
              echo "Found Qt libs directory via qmake: $QT_LIBS"
              
              # 修复：复制所有缺失的 Qt 库
              echo "复制缺失的 Qt 库..."
              find "${APPIMAGE_DST_PATH}/usr/qml" -name "lib*.so" -type f 2>/dev/null | while read plugin; do
                ldd "$plugin" 2>/dev/null | grep "$QT_LIBS" | awk '{print $3}' | sort -u | while read lib; do
                  if [ -f "$lib" ]; then
                    libname=$(basename "$lib")
                    if [ ! -f "${APPIMAGE_DST_PATH}/usr/lib/$libname" ]; then
                      cp "$lib" "${APPIMAGE_DST_PATH}/usr/lib/" 2>/dev/null && echo "  复制: $libname" || true
                    fi
                  fi
                done
              done
              echo "✓ Qt 库复制完成"
            fi
            
            QML_FOUND=true
          fi
          
          if [ "$QML_FOUND" = false ]; then
            echo "ERROR: QML directory not found via qmake!"
            # 尝试备用路径
            for qml_dir in /usr/lib/qt6/qml /usr/lib/*/qt6/qml /usr/lib/x86_64-linux-gnu/qt6/qml /opt/qt/*/gcc_64/qml; do
              if [ -d "$qml_dir" ]; then
                echo "Trying fallback QML directory: $qml_dir"
                rm -rf ${APPIMAGE_DST_PATH}/usr/qml
                mkdir -p ${APPIMAGE_DST_PATH}/usr/qml
                rsync -a --copy-links "$qml_dir"/ ${APPIMAGE_DST_PATH}/usr/qml/
                QML_FOUND=true
                break
              fi
            done
          fi
          
          if [ "$QML_FOUND" = false ]; then
            echo "ERROR: QML directory not found in any location!"
            exit 1
          fi
          
          # 严格验证关键 QML 模块
          QML_CONTROLS_FOUND=false
          QML_QUICK_FOUND=false

          if [ -f "${APPIMAGE_DST_PATH}/usr/qml/QtQuick/Controls/qmldir" ]; then
            QML_CONTROLS_FOUND=true
          elif [ -f "${APPIMAGE_DST_PATH}/usr/qml/QtQuick/Controls2/qmldir" ]; then
            QML_CONTROLS_FOUND=true
          fi

          if [ -d "${APPIMAGE_DST_PATH}/usr/qml/QtQuick" ]; then
            QML_QUICK_FOUND=true
          fi

          if [ "$QML_CONTROLS_FOUND" = true ] && [ "$QML_QUICK_FOUND" = true ]; then
            echo "✓ QML modules copied successfully (Controls+Quick)"
          else
            echo "ERROR: Required QML modules not found!"
            echo "  QtQuick Controls: $QML_CONTROLS_FOUND"
            echo "  QtQuick: $QML_QUICK_FOUND"
            exit 1
          fi
          
          # 修复 AppRun：linuxdeploy 可能生成符号链接或二进制文件，需要替换为 shell 脚本
          if [ -L "${APPIMAGE_DST_PATH}/AppRun" ]; then
            # AppRun 是符号链接，删除后重新创建
            echo "AppRun is a symlink, replacing with shell script..."
            rm -f ${APPIMAGE_DST_PATH}/AppRun
          elif [ -f "${APPIMAGE_DST_PATH}/AppRun" ]; then
            if file "${APPIMAGE_DST_PATH}/AppRun" | grep -q "ELF"; then
              echo "AppRun is ELF binary, replacing with shell script..."
              mv ${APPIMAGE_DST_PATH}/AppRun ${APPIMAGE_DST_PATH}/AppRun.real
            else
              # 如果已经是 shell 脚本但没有正确配置，备份并重新创建
              if ! grep -q "LD_LIBRARY_PATH" "${APPIMAGE_DST_PATH}/AppRun" 2>/dev/null; then
                echo "AppRun exists but not properly configured, recreating..."
                mv ${APPIMAGE_DST_PATH}/AppRun ${APPIMAGE_DST_PATH}/AppRun.bak
              else
                echo "AppRun is already a valid shell script"
              fi
            fi
          else
            echo "WARNING: AppRun not found, creating new one"
          fi

          # 创建正确的 AppRun shell 脚本
          cat > ${APPIMAGE_DST_PATH}/AppRun << 'EOF'
          #!/bin/bash
          set -e
          APPDIR="$(dirname "$(readlink -f "$0")")"
          
          # 清除干扰的环境变量
          unset QT_PLUGIN_PATH
          unset QT_QPA_PLATFORM_PLUGIN_PATH
          unset LD_LIBRARY_PATH
          unset QTDIR
          unset QT_SELECT
          
          # 设置 AppImage 特定的环境变量
          export LD_LIBRARY_PATH="${APPDIR}/usr/lib"
          export PATH="${APPDIR}/usr/bin:${PATH}"
          export QT_PLUGIN_PATH="${APPDIR}/usr/plugins"
          export QML2_IMPORT_PATH="${APPDIR}/usr/qml"
          export QT_QPA_PLATFORM=xcb
          export XDG_DATA_HOME="${XDG_DATA_HOME:-${HOME}/.local/share}"
          export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-${HOME}/.config}"
          
          # 添加 XDG_DATA_DIRS，让系统能够找到 AppImage 内部的图标
          # 这样桌面环境才能正确显示任务栏图标
          export XDG_DATA_DIRS="${APPDIR}/usr/share:${XDG_DATA_DIRS:-/usr/local/share:/usr/share}"
          
          # 全局变量定义（用于 desktop 文件和图标管理）
          export DESKTOP_FILE="${APPDIR}/io.github.tangsangsimida.easykiconverter.desktop"
          export USER_DESKTOP_DIR="${HOME}/.local/share/applications"
          export USER_ICON_DIR="${HOME}/.local/share/icons/hicolor"
          export USER_DESKTOP_PATH="${USER_DESKTOP_DIR}/io.github.tangsangsimida.easykiconverter.desktop"
          export APPIMAGE_PATH="$APPIMAGE"
          
          # 自动安装 desktop 文件和图标到用户目录（支持路径检测和更新）
          install_desktop_file() {
              # 创建用户目录
              mkdir -p "${USER_DESKTOP_DIR}"
              
              # 如果 desktop 文件不存在，创建它
              if [ ! -f "${USER_DESKTOP_PATH}" ]; then
                  if [ -f "${DESKTOP_FILE}" ]; then
                      cp "${DESKTOP_FILE}" "${USER_DESKTOP_PATH}"
                      chmod +x "${USER_DESKTOP_PATH}"
                      
                      # 添加 AppImage 路径标记
                      if [ -n "$APPIMAGE_PATH" ]; then
                          echo "X-AppImage-Path=${APPIMAGE_PATH}" >> "${USER_DESKTOP_PATH}"
                      fi
                  fi
              fi
              
              # 检查并更新 AppImage 路径（支持 AppImage 移动）
              if [ -f "${USER_DESKTOP_PATH}" ] && [ -n "$APPIMAGE_PATH" ]; then
                  # 检查 desktop 文件中的 Exec 路径是否需要更新
                  local CURRENT_EXEC=$(grep "^Exec=" "${USER_DESKTOP_PATH}" | cut -d= -f2 | cut -d' ' -f1)
                  
                  if [ "$CURRENT_EXEC" != "$APPIMAGE_PATH" ]; then
                      echo "AppImage 路径已更新: $CURRENT_EXEC -> $APPIMAGE_PATH" >&2
                      sed -i "s|^Exec=.*|Exec=${APPIMAGE_PATH} %F|" "${USER_DESKTOP_PATH}"
                      
                      # 更新 AppImage 路径标记
                      if grep -q "^X-AppImage-Path=" "${USER_DESKTOP_PATH}"; then
                          sed -i "s|^X-AppImage-Path=.*|X-AppImage-Path=${APPIMAGE_PATH}|" "${USER_DESKTOP_PATH}"
                      else
                          echo "X-AppImage-Path=${APPIMAGE_PATH}" >> "${USER_DESKTOP_PATH}"
                      fi
                  fi
              fi
              
              # 复制图标到用户目录（如果缺失）
              for size in 16 24 32 48 64 128 256 512; do
                  local ICON_DIR="${USER_ICON_DIR}/${size}x${size}/apps"
                  local ICON_FILE="${APPDIR}/usr/share/icons/hicolor/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png"
                  
                  if [ -f "${ICON_FILE}" ] && [ ! -f "${ICON_DIR}/io.github.tangsangsimida.easykiconverter.png" ]; then
                      mkdir -p "${ICON_DIR}"
                      cp "${ICON_FILE}" "${ICON_DIR}/io.github.tangsangsimida.easykiconverter.png"
                  fi
              done
              
              # 复制暗色主题图标（如果缺失）
              if [ -d "${APPDIR}/usr/share/icons/hicolor-dark" ]; then
                  for size in 16 24 32 48 64 128 256 512; do
                      local ICON_DIR="${HOME}/.local/share/icons/hicolor-dark/${size}x${size}/apps"
                      local ICON_FILE="${APPDIR}/usr/share/icons/hicolor-dark/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png"
                      
                      if [ -f "${ICON_FILE}" ] && [ ! -f "${ICON_DIR}/io.github.tangsangsimida.easykiconverter.png" ]; then
                          mkdir -p "${ICON_DIR}"
                          cp "${ICON_FILE}" "${ICON_DIR}/io.github.tangsangsimida.easykiconverter.png"
                      fi
                  done
              fi
              
              # 更新桌面数据库
              if command -v update-desktop-database >/dev/null 2>&1; then
                  update-desktop-database "${USER_DESKTOP_DIR}" >/dev/null 2>&1 &
              fi
              
              # 更新图标缓存
              if command -v gtk-update-icon-cache >/dev/null 2>&1; then
                  gtk-update-icon-cache -q "${USER_ICON_DIR}" >/dev/null 2>&1 &
              fi
          }
          
          # 卸载 desktop 文件和图标
          uninstall_desktop_file() {
              # 等待 desktop 文件安装完成
              wait
              
              echo "正在卸载 EasyKiConverter AppImage..."
              echo ""
              
              # 删除 desktop 文件
              USER_DESKTOP_PATH="${USER_DESKTOP_DIR}/io.github.tangsangsimida.easykiconverter.desktop"
              if [ -f "${USER_DESKTOP_PATH}" ]; then
                  rm -f "${USER_DESKTOP_PATH}"
                  echo "已删除 desktop 文件: ${USER_DESKTOP_PATH}"
              fi
              
              # 删除所有尺寸的图标（浅色和暗色主题）
              removed_count=0
              for size in 16 24 32 48 64 128 256 512; do
                  icon_file="${USER_ICON_DIR}/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png"
                  if [ -f "$icon_file" ]; then
                      rm -f "$icon_file"
                      echo "已删除图标 ($size x $size): $icon_file"
                      removed_count=$((removed_count + 1))
                  fi
              done
              
              # 删除暗色主题图标
              if [ -d "${HOME}/.local/share/icons/hicolor-dark" ]; then
                  for size in 16 24 32 48 64 128 256 512; do
                      icon_file="${HOME}/.local/share/icons/hicolor-dark/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png"
                      if [ -f "$icon_file" ]; then
                          rm -f "$icon_file"
                          echo "已删除暗色图标 ($size x $size): $icon_file"
                          removed_count=$((removed_count + 1))
                      fi
                  done
              fi
              
              # 更新桌面数据库
              if command -v update-desktop-database >/dev/null 2>&1; then
                  update-desktop-database "${USER_DESKTOP_DIR}" 2>/dev/null
                  echo "桌面数据库已更新"
              fi
              
              # 更新图标缓存
              if command -v gtk-update-icon-cache >/dev/null 2>&1; then
                  for theme in hicolor hicolor-dark; do
                      if [ -d "${USER_ICON_DIR}/$theme" ]; then
                          gtk-update-icon-cache -q "${USER_ICON_DIR}/$theme" 2>/dev/null
                          echo "图标缓存已更新: $theme"
                      fi
                  done
              fi
              
              echo ""
              echo "卸载完成！"
              echo "已删除 $removed_count 个图标文件"
              echo ""
              echo "提示："
              echo "  1. 您可以手动删除 AppImage 文件"
              echo "  2. 如果任务栏图标仍然显示，请注销并重新登录"
              echo "  3. 或者重启桌面环境以刷新图标缓存"
              echo ""
              exit 0
          }
          
          # 后台安装 desktop 文件（不阻塞启动）
          install_desktop_file &
          
          # 检查是否需要卸载
          if [ "$1" = "--uninstall" ]; then
              uninstall_desktop_file
          fi
          
          # 启动应用
          exec "${APPDIR}/usr/bin/easykiconverter" "$@"
          EOF
          chmod +x ${APPIMAGE_DST_PATH}/AppRun
          echo "✓ AppRun created successfully"

      - name: Verify AppDir Contents
        run: |
          echo "=== Verifying AppDir contents ==="
          
          # 定义 AppDir 路径
          APPIMAGE_DST_PATH="${GITHUB_WORKSPACE}/${PRODUCT}.AppDir"
          echo "Checking AppDir at: $APPIMAGE_DST_PATH"

          # 修复可执行文件权限（确保上传前权限正确）
          chmod +x ${APPIMAGE_DST_PATH}/usr/bin/easykiconverter
          find ${APPIMAGE_DST_PATH}/usr/bin -type f -exec chmod +x {} \; 2>/dev/null || true
          find ${APPIMAGE_DST_PATH}/usr/libexec -type f -exec chmod +x {} \; 2>/dev/null || true
          chmod +x ${APPIMAGE_DST_PATH}/AppRun 2>/dev/null || true
          echo "✓ Permissions fixed"

          # 验证 AppRun
          if [ ! -f "${APPIMAGE_DST_PATH}/AppRun" ]; then
            echo "ERROR: AppRun not found!"
            exit 1
          fi

          if file "${APPIMAGE_DST_PATH}/AppRun" | grep -q "ELF"; then
            echo "ERROR: AppRun is still an ELF binary!"
            exit 1
          fi
          echo "✓ AppRun is a valid shell script"

          # 验证 QML 模块
          if [ ! -d "${APPIMAGE_DST_PATH}/usr/qml" ]; then
            echo "ERROR: QML directory not found!"
            exit 1
          fi

          QML_COUNT=$(find "${APPIMAGE_DST_PATH}/usr/qml" -name "*.so" 2>/dev/null | wc -l)
          if [ "$QML_COUNT" -lt 10 ]; then
            echo "ERROR: Too few QML plugins found ($QML_COUNT)"
            exit 1
          fi
          echo "✓ QML modules verified ($QML_COUNT plugins found)"

          # 验证关键 Qt 库
          for lib in libQt6Quick.so.6 libQt6Qml.so.6 libQt6QuickControls2.so.6; do
            if [ ! -f "${APPIMAGE_DST_PATH}/usr/lib/$lib" ]; then
              echo "ERROR: Required library not found: $lib"
              exit 1
            fi
          done
          echo "✓ All required Qt libraries present"

          # 验证 Qt 平台插件
          if [ -d "${APPIMAGE_DST_PATH}/usr/plugins/platforms" ]; then
            PLATFORM_COUNT=$(find "${APPIMAGE_DST_PATH}/usr/plugins/platforms" -name "*.so" 2>/dev/null | wc -l)
            echo "Found $PLATFORM_COUNT platform plugins"
            ls "${APPIMAGE_DST_PATH}/usr/plugins/platforms/" 2>/dev/null || true
          else
            echo "WARNING: No platforms directory found!"
          fi

          # 验证 OpenGL 库
          OPENGL_LIBS=$(ls ${APPIMAGE_DST_PATH}/usr/lib/libQt6OpenGL*.so* 2>/dev/null | wc -l)
          echo "Found $OPENGL_LIBS OpenGL libraries"

          # 验证 hicolor 图标
          ICON_COUNT=$(find "${APPIMAGE_DST_PATH}/usr/share/icons/hicolor" -name "*.png" 2>/dev/null | wc -l)
          if [ "$ICON_COUNT" -lt 8 ]; then
            echo "ERROR: Insufficient hicolor icons ($ICON_COUNT)"
            exit 1
          fi
          echo "✓ hicolor icons verified ($ICON_COUNT icons found)"

          echo "=== AppDir verification passed ==="

      - name: Upload AppDir Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-appdir
          path: ${{ github.workspace }}/${{ env.PRODUCT }}.AppDir
          retention-days: 1

  # ===========================================================================
  # 阶段 2: 独立打包任务 (Package Anywhere)
  # 并行执行，互不干扰
  # ===========================================================================

  pack-appimage:
    name: 'Package: AppImage'
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/get-version
        id: version

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse libfuse2 rsync wget

      - name: Install LinuxDeploy
        run: |
          # 安装 linuxdeploy
          wget -q -O /tmp/linuxdeploy https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x /tmp/linuxdeploy
          /tmp/linuxdeploy --appimage-extract
          sudo cp -r squashfs-root/* /opt/linuxdeploy/
          sudo ln -sf /opt/linuxdeploy/AppRun /usr/local/bin/linuxdeploy
          
          # 安装 linuxdeploy Qt 插件
          wget -q -O /tmp/linuxdeploy-plugin-qt https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x /tmp/linuxdeploy-plugin-qt
          /tmp/linuxdeploy-plugin-qt --appimage-extract
          sudo cp -r squashfs-root/* /opt/linuxdeploy-plugin-qt/
          sudo ln -sf /opt/linuxdeploy-plugin-qt/AppRun /usr/local/bin/linuxdeploy-plugin-qt
          
          # 验证安装
          which linuxdeploy || echo "ERROR: linuxdeploy not found"
          /opt/linuxdeploy/AppRun --version || echo "ERROR: linuxdeploy not executable"
          
          # 刷新 PATH 并设置环境变量
          echo "/opt/linuxdeploy" >> $GITHUB_PATH
          echo "/opt/linuxdeploy-plugin-qt" >> $GITHUB_PATH
          echo "DEPLOY_MODE=unpackaged" >> $GITHUB_ENV

      - name: Download AppDir
        uses: actions/download-artifact@v4
        with:
          name: built-appdir
          path: ${{ env.PRODUCT }}.AppDir

      - name: Debug - List AppDir
        run: |
          echo "=== AppDir Library Inventory ==="
          echo ""
          echo "--- Qt Libraries ---"
          find ${{ env.PRODUCT }}.AppDir/usr/lib -name "libQt6*.so*" -type f 2>/dev/null | head -30
          echo ""
          echo "--- Qt Plugins (sqldrivers) ---"
          ls -la ${{ env.PRODUCT }}.AppDir/usr/plugins/sqldrivers/ 2>/dev/null || echo "(empty)"
          echo ""
          echo "--- Qt Plugins (platforms) ---"
          ls -la ${{ env.PRODUCT }}.AppDir/usr/plugins/platforms/ 2>/dev/null || echo "(empty)"
          echo ""
          echo "--- QML Modules ---"
          ls -la ${{ env.PRODUCT }}.AppDir/usr/qml/ 2>/dev/null | head -20
          echo ""
          echo "=== End of Inventory ==="

      - name: Generate AppImage
        run: |
          # 删除宿主机上的 Qt SQL 驱动，避免 linuxdeploy 扫描到它们
          # 注意：pack-appimage 运行在不同的容器，需要单独删除
          echo "=== 删除宿主机 Qt SQL 驱动 ==="
          for qt_lib_dir in /opt/qt/*/gcc_64/plugins/sqldrivers; do
            if [ -d "$qt_lib_dir" ]; then
              echo "检查并删除: $qt_lib_dir"
              ls -la "$qt_lib_dir" 2>/dev/null || true
              rm -f "$qt_lib_dir"/libqsql*.so* 2>/dev/null || true
              echo "[-] 已删除 SQL 驱动"
            fi
          done
          echo "=== SQL 驱动清理完成 ==="
          echo ""

          # 确保可执行文件有执行权限（在 linuxdeploy 重新打包前）
          chmod +x ${{ env.PRODUCT }}.AppDir/usr/bin/easykiconverter
          find ${{ env.PRODUCT }}.AppDir/usr/bin -type f -exec chmod +x {} \; 2>/dev/null || true
          find ${{ env.PRODUCT }}.AppDir/usr/libexec -type f -exec chmod +x {} \; 2>/dev/null || true
          chmod +x ${{ env.PRODUCT }}.AppDir/AppRun 2>/dev/null || true
          echo "✓ Permissions set before linuxdeploy"

          # 重新运行 linuxdeploy 以生成 AppImage
          # 必须再次指定 executable 和 desktop-file 否则 AppRun 可能不会正确链接
          # 注意：SQL 驱动已在前面步骤中删除（build-core + 本步骤开始时）
          /opt/linuxdeploy/AppRun --appdir ${{ env.PRODUCT }}.AppDir --plugin qt \
            --executable ${{ env.PRODUCT }}.AppDir/usr/bin/easykiconverter \
            --desktop-file ${{ env.PRODUCT }}.AppDir/io.github.tangsangsimida.easykiconverter.desktop \
            --output appimage

          # linuxdeploy 会覆盖 desktop 文件的 Exec 字段，需要手动修复
          echo "修复 desktop 文件的 Exec 字段..."
          sed -i "s|^Exec=.*easykiconverter|Exec=AppRun|" ${{ env.PRODUCT }}.AppDir/io.github.tangsangsimida.easykiconverter.desktop
          sed -i "s|^Exec=.*easykiconverter|Exec=AppRun|" ${{ env.PRODUCT }}.AppDir/usr/share/applications/io.github.tangsangsimida.easykiconverter.desktop

          # 重新打包（使用修复后的 desktop 文件）
          echo "使用修复后的 AppDir 重新生成 AppImage..."
          /opt/linuxdeploy/AppRun --appdir ${{ env.PRODUCT }}.AppDir --output appimage

          # linuxdeploy 可能会改变文件权限，重新设置
          chmod +x EasyKiConverter-*.AppImage
          echo "✓ AppImage permissions fixed"

          # 重命名
          mv EasyKiConverter-*.AppImage \
             ${{ env.PRODUCT }}-${{ steps.version.outputs.VERSION }}-g${{ steps.version.outputs.GIT_HASH }}.x86_64.AppImage

          # Checksum
          sha256sum *.AppImage | tee ${{ env.PRODUCT }}-${{ steps.version.outputs.VERSION }}-g${{ steps.version.outputs.GIT_HASH }}.x86_64.AppImage.sha256sum

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyKiConverter-${{ steps.version.outputs.VERSION }}-g${{ steps.version.outputs.GIT_HASH }}-x86_64.AppImage
          path: |
            *.AppImage
            *.sha256sum

  pack-deb:
    name: 'Package: DEB (Debian/Ubuntu)'
    needs: build-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/get-version
        id: version

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg curl wget

      - name: Install nfpm
        run: |
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Download AppDir
        uses: actions/download-artifact@v4
        with:
          name: built-appdir
          path: ${{ env.PRODUCT }}.AppDir

      - name: Generate DEB
        run: |
          export VERSION="${{ steps.version.outputs.VERSION}}"

          if [ -d "${{ env.PRODUCT }}.AppDir" ]; then
            export APP_DIR="${GITHUB_WORKSPACE}/${{ env.PRODUCT }}.AppDir"
          else
            echo "ERROR: AppDir not found!"
            exit 1
          fi

          echo "=== APP_DIR = $APP_DIR ==="
          ls -la "$APP_DIR" | head -20

          # 检查 desktop 文件是否存在
          if [ -f "$APP_DIR/io.github.tangsangsimida.easykiconverter.desktop" ]; then
            echo "✓ Desktop file found in AppDir root"
          else
            echo "WARNING: Desktop file not found in AppDir root"
          fi
          if [ -f "$APP_DIR/usr/share/applications/io.github.tangsangsimida.easykiconverter.desktop" ]; then
            echo "✓ Desktop file found in usr/share/applications"
          else
            echo "WARNING: Desktop file not found in usr/share/applications"
          fi

          # 准备脚本（复制项目中的脚本文件）
          mkdir -p scripts
          cp deploy/scripts/postinstall.sh scripts/postinstall.sh
          cp deploy/scripts/prerm.sh scripts/preremove.sh
          cp deploy/scripts/postrm.sh scripts/postrm.sh
          chmod +x scripts/*.sh

          # 使用 sed 动态替换 nfpm.yaml 中的 ${APP_DIR} 变量和其他路径
          sed -e "s|\${APP_DIR}|$APP_DIR|g" \
              -e "s|deploy/scripts/postinstall.sh|$(pwd)/deploy/scripts/postinstall.sh|g" \
              -e "s|deploy/scripts/prerm.sh|$(pwd)/deploy/scripts/prerm.sh|g" \
              -e "s|deploy/scripts/postrm.sh|$(pwd)/deploy/scripts/postrm.sh|g" \
              -e "s|deploy/scripts/easykiconverter-wrapper.sh|$(pwd)/deploy/scripts/easykiconverter-wrapper.sh|g" \
              -e "s|deploy/scripts/easykiconverter-register.sh|$(pwd)/deploy/scripts/easykiconverter-register.sh|g" \
              -e "s|deploy/scripts/easykiconverter-register.desktop|$(pwd)/deploy/scripts/easykiconverter-register.desktop|g" \
              -e "s|deploy/scripts/trigger-gnome-refresh.sh|$(pwd)/deploy/scripts/trigger-gnome-refresh.sh|g" \
              -e "s|deploy/metainfo/io.github.tangsangsimida.easykiconverter.metainfo.xml|$(pwd)/deploy/metainfo/io.github.tangsangsimida.easykiconverter.metainfo.xml|g" \
              deploy/nfpm.yaml > nfpm_temp.yaml

          # 确保 AppDir 中所有二进制文件有执行权限（解决 root 用户创建文件的问题）
          find "$APP_DIR" -type f -name "easykiconverter" -exec chmod 755 {} \;
          find "$APP_DIR/usr/bin" -type f -exec chmod 755 {} \; 2>/dev/null || true
          find "$APP_DIR/usr/libexec" -type f -exec chmod 755 {} \; 2>/dev/null || true
          chmod 755 "$APP_DIR/AppRun" 2>/dev/null || true
          echo "✓ Permissions fixed before nfpm packaging"

          # 打包
          nfpm pkg --packager deb --target . --config nfpm_temp.yaml

          # 重命名
          find . -name "*.deb" -exec mv {} ${{ env.PRODUCT }}-${{ steps.version.outputs.VERSION }}-g${{ steps.version.outputs.GIT_HASH }}_amd64.deb \;

          # Checksum
          sha256sum *.deb | tee ${{ env.PRODUCT }}-${{ steps.version.outputs.VERSION }}-g${{ steps.version.outputs.GIT_HASH }}_amd64.deb.sha256sum

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyKiConverter-${{ steps.version.outputs.VERSION }}-g${{ steps.version.outputs.GIT_HASH }}-amd64.deb
          path: |
            *.deb
            *.sha256sum

  pack-rpm:
