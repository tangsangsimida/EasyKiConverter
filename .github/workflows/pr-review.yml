name: 'Pull Request Review'

on:
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'synchronize'
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: 'number'

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: false

defaults:
  run:
    shell: 'bash'

permissions:
  contents: 'read'
  issues: 'write'
  pull-requests: 'write'
  statuses: 'write'

jobs:
  review-pr:
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        (
          github.event.repository.private == true ||
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
        )
      )
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Get PR number for push events'
        id: 'get_pr_for_push'
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -euo pipefail
          # Find PR associated with this push by checking the head ref
          BRANCH="${{ github.ref_name }}"
          PR_DATA=$(gh pr list --head "${BRANCH}" --json number --jq '.[0]' 2>/dev/null || echo "")
          if [ -z "${PR_DATA}" ]; then
            echo "No PR found for branch ${BRANCH}, skipping..."
            echo "skip_review=true" >> "${GITHUB_OUTPUT}"
          else
            PR_NUMBER=$(echo "${PR_DATA}" | jq -r '.number')
            echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
            echo "skip_review=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 'Check if should skip'
        if: github.event_name == 'push'
        run: |
          if [ "${{ steps.get_pr_for_push.outputs.skip_review }}" == "true" ]; then
            echo "No PR associated with this push, skipping review"
            exit 0
          fi

      - name: 'Checkout PR code'
        if: github.event_name != 'push' || steps.get_pr_for_push.outputs.skip_review != 'true'
        uses: 'actions/checkout@v4'

      - name: 'Get PR details'
        id: 'get_pr'
        if: github.event_name != 'push' || steps.get_pr_for_push.outputs.skip_review != 'true'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |-
          set -euo pipefail

          if [[ "${{ github.event_name }}" = "workflow_dispatch" ]]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          elif [[ "${{ github.event_name }}" = "push" ]]; then
            PR_NUMBER="${{ steps.get_pr_for_push.outputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          PR_DATA="$(gh pr view "${PR_NUMBER}" --json title,body,additions,deletions,changedFiles,baseRefName,headRefName)"
          echo "pr_data=${PR_DATA}" >> "${GITHUB_OUTPUT}"
          CHANGED_FILES="$(gh pr diff "${PR_NUMBER}" --name-only)"
          {
            echo "changed_files<<EOF"
            echo "${CHANGED_FILES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: 'Get PR diff'
        id: 'pr_diff'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -eo pipefail
          PR_NUM='${{ steps.get_pr.outputs.pr_number }}'

          # Try to get full diff
          PR_DIFF=$(gh pr diff "${PR_NUM}" 2>&1) || true

          # Check if diff is too large
          if echo "${PR_DIFF}" | head -n 5 | grep -qi "too large\|406"; then
            echo "diff_truncated=true" >> "$GITHUB_OUTPUT"
            # Fallback: get file names and stat for each file
            PR_FILES=$(gh pr diff "${PR_NUM}" --name-only 2>/dev/null || echo "")
            PR_STATS=$(gh pr view "${PR_NUM}" --json additions,deletions,changedFiles --jq '{additions: .additions, deletions: .deletions, changedFiles: .changedFiles}' 2>/dev/null || echo '{"additions": 0, "deletions": 0, "changedFiles": 0}')
            echo "pr_diff<<EOF" >> "$GITHUB_OUTPUT"
            echo "[Diff 过大（超过20000行），无法获取完整变更内容]" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "变更统计: ${PR_STATS}" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT}"
            echo "变更文件列表:" >> "$GITHUB_OUTPUT}"
            echo "${PR_FILES}" >> "$GITHUB_OUTPUT}"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "diff_truncated=false" >> "$GITHUB_OUTPUT"
            echo "pr_diff<<EOF" >> "$GITHUB_OUTPUT"
            echo "${PR_DIFF}" >> "$GITHUB_OUTPUT}"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Get PR commit SHA'
        id: 'pr_sha'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          PR_SHA=$(gh api repos/${{ github.repository }}/pulls/${{ steps.get_pr.outputs.pr_number }} --jq '.head.sha')
          echo "sha=${PR_SHA}" >> "$GITHUB_OUTPUT"

      - name: 'PR Review with Inline Comments'
        id: 'pr_review'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ steps.get_pr.outputs.pr_number }}'
          PR_DATA: '${{ steps.get_pr.outputs.pr_data }}'
          CHANGED_FILES: '${{ steps.get_pr.outputs.changed_files }}'
          PR_DIFF: '${{ steps.pr_diff.outputs.pr_diff }}'
          PR_SHA: '${{ steps.pr_sha.outputs.sha }}'
          DIFF_TRUNCATED: '${{ steps.pr_diff.outputs.diff_truncated }}'
        run: |
          set -euo pipefail

          # First, get a summary review comment (always)
          SUMMARY_PROMPT="## 角色
          你是一个专业的代码审查员，首要关注点是内存安全。

          ## PR 信息
          - 仓库: ${{ github.repository }}
          - PR编号: \${PR_NUMBER}
          - PR数据: \${PR_DATA}
          - 变更文件: \${CHANGED_FILES}

          ## 代码变更 (diff)
          \${PR_DIFF}

          ## 审查重点
          1. 内存安全（最高优先级）：空指针、内存泄漏、野指针、缓冲区溢出、智能指针使用
          2. 资源安全：文件句柄、锁、数据库连接是否正确释放
          3. 代码正确性：逻辑错误、边界条件、并发问题
          4. 可维护性：代码复杂度、重复代码、命名规范

          ## 任务
          请用中文生成一份PR审查概述，包含：
          1. 审查概述（简要评价本次变更）
          2. 内存安全发现（列出发现的内存安全问题）
          3. 其他发现（最多3个重点问题）
          4. 改进建议

          如果代码存在内存安全问题，必须在概述中明确标注【内存安全警告】。"

          SUMMARY=$(curl -s https://api.minimaxi.com/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.MINIMAX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"MiniMax-M2.7\",
              \"messages\": [{\"role\": \"user\", \"content\": \"${SUMMARY_PROMPT}\"}],
              \"max_tokens\": 2000
            }" | jq -r '.choices[0].message.content // empty')

          # Create the summary review
          if [ -n "${SUMMARY}" ]; then
            gh pr review "${PR_NUMBER}" --body "${SUMMARY}" --comment
          fi

          # Only do inline comments if diff is NOT truncated
          if [[ "${DIFF_TRUNCATED}" == "true" ]]; then
            echo "Diff is too large, skipping inline comments"
            echo "pr_review_result=success (summary only)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Now get inline comments - Memory Safety Focus
          INLINE_PROMPT="## 角色
          你是一个专业的代码审查员，负责在具体代码行添加评论。你的首要任务是确保代码的内存安全。

          ## PR diff
          \${PR_DIFF}

          ## 内存安全审查要点（严格程度：极高）
          1. **空指针解引用**：所有指针使用前必须检查是否为 nullptr
          2. **内存泄漏**：禁止 raw new/delete，必须使用 smart pointers（std::unique_ptr, std::shared_ptr, QSharedPointer）
          3. **野指针/悬空指针**：检查是否有 use-after-free 风险，指针赋值前是否已失效
          4. **缓冲区溢出**：数组访问是否进行边界检查，std::vector::at() vs operator[] 的使用
          5. **智能指针滥用**：QSharedPointer::create() vs new，循环引用风险（QSharedPointer 父子循环）
          6. **资源泄漏**：文件句柄、数据库连接、锁等是否正确释放
          7. **复制粘贴错误**：检查从其他代码复制过来的片段是否有遗漏的修改
          8. **nullptr vs NULL vs 0**：必须使用 nullptr，禁止 NULL 或 0

          ## 任务
          请仔细分析diff，在有内存安全问题的代码行添加评论。格式如下JSON数组：
          [
            {
              \"path\": \"文件路径\",
              \"line\": 行号,
              \"side\": \"RIGHT\",
              \"body\": \"评论内容（中文）【内存安全警告：问题类型】\"
            }
          ]

          ## 规则
          - 宁可错杀不可放过：疑似内存安全问题的代码行必须标记
          - line必须是diff中实际修改的行号
          - side通常是RIGHT（新增内容），如果是删除则用LEFT
          - body必须明确标注问题类型，如【空指针】【内存泄漏】【缓冲区溢出】【悬空指针】【建议使用智能指针】
          - 只输出JSON数组，不要有任何其他内容
          - 如果没有问题，返回空数组 []

          ## 示例
          [
            {\"path\": \"src/core/ExportService.cpp\", \"line\": 156, \"side\": \"RIGHT\", \"body\": \"【内存泄漏】raw new 而非使用 QSharedPointer::create()\"},
            {\"path\": \"src/core/ExportService.cpp\", \"line\": 203, \"side\": \"RIGHT\", \"body\": \"【空指针】ptr 未检查 nullptr 就解引用\"}
          ]"

          INLINE_RESPONSE=$(curl -s https://api.minimaxi.com/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.MINIMAX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"MiniMax-M2.7\",
              \"messages\": [{\"role\": \"user\", \"content\": \"${INLINE_PROMPT}\"}],
              \"max_tokens\": 4000
            }" | jq -r '.choices[0].message.content // empty')

          echo "=== Inline Comments Response ==="
          echo "${INLINE_RESPONSE}"
          echo "================================"

          # Parse and create inline comments
          echo "${INLINE_RESPONSE}" | jq -r '.[] | @json' 2>/dev/null | while read -r comment; do
            if [ -n "${comment}" ] && [ "${comment}" != "null" ]; then
              PATH=$(echo "${comment}" | jq -r '.path')
              LINE=$(echo "${comment}" | jq -r '.line')
              SIDE=$(echo "${comment}" | jq -r '.side // "RIGHT"')
              BODY=$(echo "${comment}" | jq -r '.body')

              if [ -n "${PATH}" ] && [ -n "${LINE}" ] && [ -n "${BODY}" ] && [ "${PATH}" != "null" ] && [ "${LINE}" != "null" ] && [ "${BODY}" != "null" ]; then
                echo "Creating comment on ${PATH}:${LINE}"
                gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments \
                  --method POST \
                  --field body="${BODY}" \
                  --field commit_id="${PR_SHA}" \
                  --field path="${PATH}" \
                  --field line="${LINE}" \
                  --field side="${SIDE}" 2>/dev/null || true
              fi
            fi
          done

          echo "pr_review_result=success" >> "$GITHUB_OUTPUT"

      - name: 'Post PR review failure comment'
        if: |-
          ${{ failure() && steps.pr_review.outcome == 'failure' }}
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |-
            github.rest.issues.createComment({
              owner: '${{ github.repository }}'.split('/')[0],
              repo: '${{ github.repository }}'.split('/')[1],
              issue_number: '${{ steps.get_pr.outputs.pr_number }}',
              body: '## PR Review Failed\n\nThere is a problem with the PR review automation.\n\nPlease check the action logs for details.'
            })
