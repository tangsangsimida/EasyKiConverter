name: 'Pull Request Review'

on:
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'synchronize'
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: 'number'

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: false

defaults:
  run:
    shell: 'bash'

permissions:
  contents: 'read'
  issues: 'write'
  pull-requests: 'write'
  statuses: 'write'

jobs:
  review-pr:
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        (
          github.event.repository.private == true ||
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
        )
      )
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Get PR number for push events'
        id: 'get_pr_for_push'
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          PR_DATA=$(gh pr list --head "${BRANCH}" --json number --jq '.[0]' 2>/dev/null || echo "")
          if [ -z "${PR_DATA}" ]; then
            echo "No PR found for branch ${BRANCH}, skipping..."
            echo "skip_review=true" >> "${GITHUB_OUTPUT}"
          else
            PR_NUMBER=$(echo "${PR_DATA}" | jq -r '.number')
            echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
            echo "skip_review=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 'Check if should skip'
        if: github.event_name == 'push'
        run: |
          if [ "${{ steps.get_pr_for_push.outputs.skip_review }}" == "true" ]; then
            echo "No PR associated with this push, skipping review"
            exit 0
          fi

      - name: 'Checkout PR code'
        if: github.event_name != 'push' || steps.get_pr_for_push.outputs.skip_review != 'true'
        uses: 'actions/checkout@v4'

      - name: 'Get PR details'
        id: 'get_pr'
        if: github.event_name != 'push' || steps.get_pr_for_push.outputs.skip_review != 'true'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" = "workflow_dispatch" ]]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          elif [[ "${{ github.event_name }}" = "push" ]]; then
            PR_NUMBER="${{ steps.get_pr_for_push.outputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          PR_DATA="$(gh pr view "${PR_NUMBER}" --json title,body,additions,deletions,changedFiles,baseRefName,headRefName)"
          echo "pr_data=${PR_DATA}" >> "${GITHUB_OUTPUT}"
          CHANGED_FILES="$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/files --jq '[.[].filename] | join("\n")' 2>/dev/null || echo "")"
          echo "changed_files<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${CHANGED_FILES}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: 'Get changed files list'
        id: 'changed_files'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -eo pipefail
          PR_NUM='${{ steps.get_pr.outputs.pr_number }}'
          FILES_DATA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM}/files --jq '[.[].filename]' 2>/dev/null || echo '[]')
          echo "files=${FILES_DATA}" >> "$GITHUB_OUTPUT"

      - name: 'Get PR diff stats'
        id: 'pr_diff'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -eo pipefail
          PR_NUM='${{ steps.get_pr.outputs.pr_number }}'
          DIFF_SUM=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM}/files --jq '[.[].additions + .[].deletions] | add' 2>/dev/null || echo "0")
          FILE_COUNT=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM}/files --jq 'length' 2>/dev/null || echo "0")
          echo "Total diff lines: ${DIFF_SUM}"
          echo "Total files: ${FILE_COUNT}"
          if [ "${DIFF_SUM}" -gt 15000 ]; then
            echo "diff_truncated=true" >> "$GITHUB_OUTPUT"
            echo "pr_diff<<EOF" >> "$GITHUB_OUTPUT"
            echo "[Diff 过大（${DIFF_SUM} 行），将使用逐文件审查模式]" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "diff_truncated=false" >> "$GITHUB_OUTPUT"
            PR_STATS=$(gh pr view "${PR_NUM}" --json additions,deletions,changedFiles --jq '{additions: .additions, deletions: .deletions, changedFiles: .changedFiles}' 2>/dev/null || echo '{}')
            echo "pr_diff<<EOF" >> "$GITHUB_OUTPUT"
            echo "[Diff 正常模式] 变更统计: ${PR_STATS}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Get PR commit SHA'
        id: 'pr_sha'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          PR_SHA=$(gh api repos/${{ github.repository }}/pulls/${{ steps.get_pr.outputs.pr_number }} --jq '.head.sha')
          echo "sha=${PR_SHA}" >> "$GITHUB_OUTPUT"

      - name: 'PR Review with Inline Comments'
        id: 'pr_review'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ steps.get_pr.outputs.pr_number }}'
          PR_DATA: '${{ steps.get_pr.outputs.pr_data }}'
          CHANGED_FILES: '${{ steps.get_pr.outputs.changed_files }}'
          PR_DIFF: '${{ steps.pr_diff.outputs.pr_diff }}'
          PR_SHA: '${{ steps.pr_sha.outputs.sha }}'
          DIFF_TRUNCATED: '${{ steps.pr_diff.outputs.diff_truncated }}'
          MINIMAX_API_KEY: '${{ secrets.MINIMAX_API_KEY }}'
          REPO_NAME: '${{ github.repository }}'
        run: |
          set -euo pipefail
          echo "=== Starting PR Review ==="
          echo "PR Number: ${PR_NUMBER}"
          echo "Diff Truncated: ${DIFF_TRUNCATED}"
          FILE_COUNT=$(echo "${CHANGED_FILES}" | wc -l)

          # Build summary prompt using printf to avoid heredoc issues
          SUMMARY_CONTENT=$(printf '%s\n' \
            "## 角色" \
            "你是一个专业的代码审查员，首要关注点是内存安全。" \
            "" \
            "## PR 信息" \
            "- 仓库: ${REPO_NAME}" \
            "- PR编号: ${PR_NUMBER}" \
            "- 变更文件数量: ${FILE_COUNT}" \
            "" \
            "## 审查重点" \
            "1. 内存安全（最高优先级）：空指针、内存泄漏、野指针、缓冲区溢出、智能指针使用" \
            "2. 资源安全：文件句柄、锁、数据库连接是否正确释放" \
            "3. 代码正确性：逻辑错误、边界条件、并发问题" \
            "4. 可维护性：代码复杂度、重复代码、命名规范" \
            "" \
            "## 任务" \
            "请用中文生成一份PR审查概述，包含：" \
            "1. 审查概述（简要评价本次变更）" \
            "2. 内存安全发现（列出发现的内存安全问题）" \
            "3. 其他发现（最多3个重点问题）" \
            "4. 改进建议" \
            "" \
            "如果代码存在内存安全问题，必须在概述中明确标注【内存安全警告】。")

          SUMMARY_JSON=$(jq -n --arg content "${SUMMARY_CONTENT}" '{model: "MiniMax-M2.7", messages: [{role: "user", content: $content}], max_tokens: 2000}')

          echo "Calling MiniMax API for summary..."
          SUMMARY_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" https://api.minimaxi.com/v1/chat/completions \
            -H "Authorization: Bearer ${MINIMAX_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "${SUMMARY_JSON}")

          HTTP_CODE=$(echo "${SUMMARY_RESPONSE}" | tail -1 | sed 's/HTTP_CODE://')
          SUMMARY_BODY=$(echo "${SUMMARY_RESPONSE}" | head -n -1)

          echo "HTTP Code: ${HTTP_CODE}"

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "ERROR: MiniMax API returned HTTP ${HTTP_CODE}"
            echo "Response: ${SUMMARY_BODY}"
            exit 1
          fi

          SUMMARY=$(echo "${SUMMARY_BODY}" | jq -r '.choices[0].message.content // empty')
          echo "Summary response length: ${#SUMMARY}"
          echo "Summary content preview: ${SUMMARY:0:200}..."

          if [ -n "${SUMMARY}" ] && [ "${SUMMARY}" != "null" ] && [ ${#SUMMARY} -gt 10 ]; then
            echo "Creating PR review comment..."
            gh pr review "${PR_NUMBER}" --body "${SUMMARY}" --comment
            echo "PR review comment created successfully"
          else
            echo "WARNING: Summary is empty or too short, skipping PR review comment"
          fi

          # Function to create inline comments
          create_inline_comments() {
            local RESPONSE="$1"
            echo "${RESPONSE}" | jq -r '.[] | @json' 2>/dev/null | while read -r comment; do
              if [ -n "${comment}" ] && [ "${comment}" != "null" ]; then
                local C_PATH=$(echo "${comment}" | jq -r '.path')
                local C_LINE=$(echo "${comment}" | jq -r '.line')
                local C_SIDE=$(echo "${comment}" | jq -r '.side // "RIGHT"')
                local C_BODY=$(echo "${comment}" | jq -r '.body')
                if [ -n "${C_PATH}" ] && [ -n "${C_LINE}" ] && [ -n "${C_BODY}" ] && [ "${C_PATH}" != "null" ] && [ "${C_LINE}" != "null" ] && [ "${C_BODY}" != "null" ]; then
                  echo "Creating inline comment on ${C_PATH}:${C_LINE}"
                  gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/comments \
                    --method POST \
                    --field body="${C_BODY}" \
                    --field commit_id="${PR_SHA}" \
                    --field path="${C_PATH}" \
                    --field line="${C_LINE}" \
                    --field side="${C_SIDE}" 2>/dev/null || true
                fi
              fi
            done
          }

          # Per-file review mode
          if [[ "${DIFF_TRUNCATED}" == "true" ]]; then
            echo "Diff too large, using per-file review mode..."
            FILES_JSON='${{ steps.changed_files.outputs.files }}'
            FILE_COUNT=$(echo "${FILES_JSON}" | jq 'length')
            echo "Total files to review: ${FILE_COUNT}"

            echo "${FILES_JSON}" | jq -r '.[]' | while read -r FILE_PATH; do
              echo "--- Reviewing file: ${FILE_PATH} ---"

              FILE_DIFF=$(gh api repos/${{ github.repository }}/pulls/${{ steps.get_pr.outputs.pr_number }}/files \
                --jq ".[] | select(.filename == \"${FILE_PATH}\") | .patch" 2>/dev/null || echo "")

              if [ -z "${FILE_DIFF}" ] || [ "${FILE_DIFF}" == "null" ]; then
                echo "Skipping ${FILE_PATH} - no diff available"
                continue
              fi

              INLINE_CONTENT=$(printf '%s\n' \
                "## 角色" \
                "你是一个专业的代码审查员，负责在具体代码行添加评论。你的首要任务是确保代码的内存安全。" \
                "" \
                "## 文件路径" \
                "${FILE_PATH}" \
                "" \
                "## 文件 diff" \
                "${FILE_DIFF}" \
                "" \
                "## 内存安全审查要点（严格程度：极高）" \
                "1. **空指针解引用**：所有指针使用前必须检查是否为 nullptr" \
                "2. **内存泄漏**：禁止 raw new/delete，必须使用 smart pointers" \
                "3. **野指针/悬空指针**：检查是否有 use-after-free 风险" \
                "4. **缓冲区溢出**：数组访问是否进行边界检查" \
                "5. **智能指针滥用**：QSharedPointer::create() vs new" \
                "6. **资源泄漏**：文件句柄、锁等是否正确释放" \
                "7. **nullptr vs NULL vs 0**：必须使用 nullptr" \
                "" \
                "## 任务" \
                "请仔细分析diff，在有内存安全问题的代码行添加评论。格式如下JSON数组：" \
                "[{\"path\": \"文件路径\", \"line\": 行号, \"side\": \"RIGHT\", \"body\": \"评论内容\"}]" \
                "" \
                "## 规则" \
                "- 只评论有问题的代码行" \
                "- line必须是diff中实际的行号" \
                "- body不超过200字，标注问题类型" \
                "- 只输出JSON数组，不要有其他内容" \
                "- 如果没有问题，返回空数组 []")

              INLINE_JSON=$(jq -n --arg content "${INLINE_CONTENT}" '{model: "MiniMax-M2.7", messages: [{role: "user", content: $content}], max_tokens: 4000}')

              INLINE_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" https://api.minimaxi.com/v1/chat/completions \
                -H "Authorization: Bearer ${MINIMAX_API_KEY}" \
                -H "Content-Type: application/json" \
                -d "${INLINE_JSON}")

              HTTP_CODE=$(echo "${INLINE_RESPONSE}" | tail -1 | sed 's/HTTP_CODE://')
              INLINE_BODY=$(echo "${INLINE_RESPONSE}" | head -n -1)

              if [ "${HTTP_CODE}" != "200" ]; then
                echo "ERROR: MiniMax API returned HTTP ${HTTP_CODE} for ${FILE_PATH}"
                continue
              fi

              INLINE_RESPONSE=$(echo "${INLINE_BODY}" | jq -r '.choices[0].message.content // empty')
              echo "Response for ${FILE_PATH}: ${INLINE_RESPONSE:0:100}..."
              create_inline_comments "${INLINE_RESPONSE}"
            done
          else
            # Full diff mode
            INLINE_CONTENT=$(printf '%s\n' \
              "## 角色" \
              "你是一个专业的代码审查员，负责在具体代码行添加评论。你的首要任务是确保代码的内存安全。" \
              "" \
              "## PR diff" \
              "${PR_DIFF}" \
              "" \
              "## 内存安全审查要点（严格程度：极高）" \
              "1. **空指针解引用**：所有指针使用前必须检查是否为 nullptr" \
              "2. **内存泄漏**：禁止 raw new/delete，必须使用 smart pointers" \
              "3. **野指针/悬空指针**：检查是否有 use-after-free 风险" \
              "4. **缓冲区溢出**：数组访问是否进行边界检查" \
              "5. **智能指针滥用**：QSharedPointer::create() vs new" \
              "6. **资源泄漏**：文件句柄、锁等是否正确释放" \
              "7. **nullptr vs NULL vs 0**：必须使用 nullptr" \
              "" \
              "## 任务" \
              "请仔细分析diff，在有内存安全问题的代码行添加评论。格式如下JSON数组：" \
              "[{\"path\": \"文件路径\", \"line\": 行号, \"side\": \"RIGHT\", \"body\": \"评论内容\"}]" \
              "" \
              "## 规则" \
              "- 只评论有问题的代码行" \
              "- line必须是diff中实际的行号" \
              "- body不超过200字，标注问题类型" \
              "- 只输出JSON数组，不要有其他内容" \
              "- 如果没有问题，返回空数组 []")

            INLINE_JSON=$(jq -n --arg content "${INLINE_CONTENT}" '{model: "MiniMax-M2.7", messages: [{role: "user", content: $content}], max_tokens: 4000}')

            echo "Calling MiniMax API for inline comments (full diff mode)..."
            INLINE_RESPONSE=$(curl -s -w "\nHTTP_CODE:%{http_code}" https://api.minimaxi.com/v1/chat/completions \
              -H "Authorization: Bearer ${MINIMAX_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "${INLINE_JSON}")

            HTTP_CODE=$(echo "${INLINE_RESPONSE}" | tail -1 | sed 's/HTTP_CODE://')
            INLINE_BODY=$(echo "${INLINE_RESPONSE}" | head -n -1)

            if [ "${HTTP_CODE}" != "200" ]; then
              echo "ERROR: MiniMax API returned HTTP ${HTTP_CODE}"
              echo "Response: ${INLINE_BODY}"
            else
              INLINE_RESPONSE=$(echo "${INLINE_BODY}" | jq -r '.choices[0].message.content // empty')
              echo "=== Inline Comments Response ==="
              echo "${INLINE_RESPONSE:0:500}..."
              echo "================================"
              create_inline_comments "${INLINE_RESPONSE}"
            fi
          fi

          echo "pr_review_result=success" >> "$GITHUB_OUTPUT"

      - name: 'Post PR review failure comment'
        if: |-
          ${{ failure() && steps.pr_review.outcome == 'failure' }}
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |
            github.rest.issues.createComment({
              owner: '${{ github.repository }}'.split('/')[0],
              repo: '${{ github.repository }}'.split('/')[1],
              issue_number: '${{ steps.get_pr.outputs.pr_number }}',
              body: '## PR Review Failed\n\nThere is a problem with the PR review automation.\n\nPlease check the action logs for details.'
            });
