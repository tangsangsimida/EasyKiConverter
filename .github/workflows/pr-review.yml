name: 'Pull Request Review'

on:
  pull_request:
    types:
      - 'opened'
      - 'reopened'
      - 'synchronize'
  push:
    branches:
      - '*'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: 'number'

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref }}'
  cancel-in-progress: false

defaults:
  run:
    shell: 'bash'

permissions:
  contents: 'read'
  issues: 'write'
  pull-requests: 'write'
  statuses: 'write'

jobs:
  review-pr:
    if: |-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'pull_request' &&
        (
          github.event.repository.private == true ||
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
        )
      )
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Get PR number for push events'
        id: 'get_pr_for_push'
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -euo pipefail
          BRANCH="${{ github.ref_name }}"
          PR_DATA=$(gh pr list --head "${BRANCH}" --json number --jq '.[0]' 2>/dev/null || echo "")
          if [ -z "${PR_DATA}" ]; then
            echo "No PR found for branch ${BRANCH}, skipping..."
            echo "skip_review=true" >> "${GITHUB_OUTPUT}"
          else
            PR_NUMBER=$(echo "${PR_DATA}" | jq -r '.number')
            echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
            echo "skip_review=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: 'Check if should skip'
        if: github.event_name == 'push'
        run: |
          if [ "${{ steps.get_pr_for_push.outputs.skip_review }}" == "true" ]; then
            echo "No PR associated with this push, skipping review"
            exit 0
          fi

      - name: 'Checkout PR code'
        if: github.event_name != 'push' || steps.get_pr_for_push.outputs.skip_review != 'true'
        uses: 'actions/checkout@v4'

      - name: 'Get PR details'
        id: 'get_pr'
        if: github.event_name != 'push' || steps.get_pr_for_push.outputs.skip_review != 'true'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" = "workflow_dispatch" ]]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          elif [[ "${{ github.event_name }}" = "push" ]]; then
            PR_NUMBER="${{ steps.get_pr_for_push.outputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          PR_DATA="$(gh pr view "${PR_NUMBER}" --json title,body,additions,deletions,changedFiles,baseRefName,headRefName)"
          echo "pr_data<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${PR_DATA}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"
          CHANGED_FILES="$(gh api repos/${{ github.repository }}/pulls/${PR_NUMBER}/files --jq '[.[].filename] | join("\n")' 2>/dev/null || echo "")"
          echo "changed_files<<EOF" >> "${GITHUB_OUTPUT}"
          echo "${CHANGED_FILES}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"

      - name: 'Get changed files list'
        id: 'changed_files'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -euo pipefail
          PR_NUM='${{ steps.get_pr.outputs.pr_number }}'
          FILES_DATA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM}/files --jq '[.[].filename]' 2>/dev/null || echo '[]')
          echo "files=${FILES_DATA}" >> "$GITHUB_OUTPUT"

      - name: 'Get PR diff stats'
        id: 'pr_diff'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          set -euo pipefail
          PR_NUM='${{ steps.get_pr.outputs.pr_number }}'
          DIFF_SUM=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM}/files --jq '[.[].additions + .[].deletions] | add' 2>/dev/null || echo "0")
          FILE_COUNT=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM}/files --jq 'length' 2>/dev/null || echo "0")
          echo "Total diff lines: ${DIFF_SUM}"
          echo "Total files: ${FILE_COUNT}"
          if [ "${DIFF_SUM}" -gt 15000 ]; then
            echo "diff_truncated=true" >> "$GITHUB_OUTPUT"
            echo "pr_diff<<EOF" >> "$GITHUB_OUTPUT"
            echo "[Diff 过大，将使用逐文件审查模式]" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "diff_truncated=false" >> "$GITHUB_OUTPUT"
            PR_STATS=$(gh pr view "${PR_NUM}" --json additions,deletions,changedFiles --jq '{additions: .additions, deletions: .deletions, changedFiles: .changedFiles}' 2>/dev/null || echo '{}')
            echo "pr_diff<<EOF" >> "$GITHUB_OUTPUT"
            echo "[Diff 正常模式] 变更统计: ${PR_STATS}" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: 'Get PR commit SHA'
        id: 'pr_sha'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        run: |
          PR_NUM='${{ steps.get_pr.outputs.pr_number }}'
          PR_SHA=$(gh api repos/${{ github.repository }}/pulls/${PR_NUM} --jq '.head.sha')
          echo "sha=${PR_SHA}" >> "$GITHUB_OUTPUT"

      - name: 'Run PR Review'
        id: 'pr_review'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ steps.get_pr.outputs.pr_number }}'
          CHANGED_FILES: '${{ steps.get_pr.outputs.changed_files }}'
          PR_SHA: '${{ steps.pr_sha.outputs.sha }}'
          DIFF_TRUNCATED: '${{ steps.pr_diff.outputs.diff_truncated }}'
          MINIMAX_API_KEY: '${{ secrets.MINIMAX_API_KEY }}'
          REPO_NAME: '${{ github.repository }}'
        run: |
          set -euo pipefail
          SCRIPT_BASE64=""
          echo "$SCRIPT_BASE64" | base64 -d > /tmp/review.py
          python3 /tmp/review.py

      - name: 'Post PR review failure comment'
        if: |-
          ${{ failure() && steps.pr_review.outcome == 'failure' }}
        uses: 'actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea'
        with:
          github-token: '${{ secrets.GITHUB_TOKEN }}'
          script: |
            github.rest.issues.createComment({
              owner: '${{ github.repository }}'.split('/')[0],
              repo: '${{ github.repository }}'.split('/')[1],
              issue_number: '${{ steps.get_pr.outputs.pr_number }}',
              body: '## PR Review Failed\n\nThere is a problem with the PR review automation.\n\nPlease check the action logs for details.'
            });
