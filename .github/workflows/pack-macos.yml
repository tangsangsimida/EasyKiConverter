name: Packaging(MacOS)

on:
  push:
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PRODUCT: EasyKiConverter
  QT_VERSION: '6.10.1'
  CMAKE_VERSION: '3.22'

jobs:
  pack:
    name: 'Build DMG on ${{ matrix.dist.os }} ${{ matrix.dist.arch }}'
    runs-on: ${{ matrix.dist.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        dist:
          - {
              os: macos-14,
              arch: arm64
            }
          - {
              os: macos-15-intel,
              arch: intel
            }
    env:
      APP_NAME: EasyKiConverter
      DIR_BUILD: build
    steps:
      - name: 'Checkout Source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 'Get Version Info'
        id: version
        uses: ./.github/actions/get-version

      - name: 'Export Version to Env'
        shell: bash
        run: |
          echo "VERSION=${{ steps.version.outputs.VERSION }}" >> $GITHUB_ENV
          echo "VER_INFO=${{ steps.version.outputs.VER_INFO }}" >> $GITHUB_ENV
          echo "GIT_HASH=${{ steps.version.outputs.GIT_HASH }}" >> $GITHUB_ENV

      - name: 'Setup Build Environment'
        uses: ./.github/actions/setup-env
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}
          qt-version: ${{ env.QT_VERSION }}
          qt-host: 'mac'
          qt-target: 'desktop'
          enable-ccache: 'true'
          enable-sccache: 'false'

      - name: 'Configure'
        run: |
          rm -rf "${DIR_BUILD}"
          cmake -B "${DIR_BUILD}" \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR" \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF \
            -DVERSION_FROM_CI=${{ env.VERSION }}

      - name: 'Compile'
        run: |
          cmake --build "${DIR_BUILD}" --config RelWithDebInfo --parallel

      - name: 'Create App Bundle'
        run: |
          mkdir -p ${APP_NAME}.app/Contents/MacOS
          mkdir -p ${APP_NAME}.app/Contents/Resources
          cp -r ${DIR_BUILD}/bin/* ${APP_NAME}.app/Contents/MacOS/
          cp -r ${DIR_BUILD}/lib/* ${APP_NAME}.app/Contents/MacOS/ 2>/dev/null || echo "No lib directory"

          if [ -f "resources/icons/app_icon.icns" ]; then
            cp resources/icons/app_icon.icns ${APP_NAME}.app/Contents/Resources/AppIcon.icns
          fi

          cat > ${APP_NAME}.app/Contents/Info.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>easykiconverter</string>
              <key>CFBundleIdentifier</key>
              <string>com.tangsangsimida.EasyKiConverter</string>
              <key>CFBundleName</key>
              <string>EasyKiConverter</string>
              <key>CFBundleDisplayName</key>
              <string>EasyKiConverter</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
          </dict>
          </plist>
          EOF

          # 使用 macdeployqt 部署 Qt 运行时库和插件
          macdeployqt ${APP_NAME}.app -qmldir=src/ui/qml -verbose=1

      - name: 'Create DMG'
        run: |
          hdiutil create -volname EasyKiConverter \
            -srcfolder ${APP_NAME}.app \
            -ov -format UDZO \
            ${PRODUCT}-${VERSION}-g${{ env.GIT_HASH }}-${{ matrix.dist.arch }}.dmg

      - name: 'SHA256Sum of DMG'
        run: |
          cd "$GITHUB_WORKSPACE/" || { >&2 echo "Cannot cd to '$GITHUB_WORKSPACE/'!"; exit 11 ; }
          shasum -a 256 ${PRODUCT}-${VERSION}-g${{ env.GIT_HASH }}-${{ matrix.dist.arch }}.dmg | tee ${PRODUCT}-${VERSION}-g${{ env.GIT_HASH }}-${{ matrix.dist.arch }}.dmg.sha256sum

      - name: 'Artifact Upload'
        uses: actions/upload-artifact@v4
        with:
          name: EasyKiConverter-${{ env.VERSION }}-g${{ env.GIT_HASH }}-${{ matrix.dist.arch }}.dmg
          path: |
            ${{ github.workspace }}/${{ env.PRODUCT }}-${{ env.VERSION }}-g${{ env.GIT_HASH }}-${{ matrix.dist.arch }}.dmg
            ${{ github.workspace }}/${{ env.PRODUCT }}-${{ env.VERSION }}-g${{ env.GIT_HASH }}-${{ matrix.dist.arch }}.dmg.sha256sum
          overwrite: true

      - name: 'Upload Release Asset'
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG="${PRODUCT}-${VERSION}-g${{ env.GIT_HASH }}-${{ matrix.dist.arch }}.dmg"
          SHA="${DMG}.sha256sum"
          TAG="${GITHUB_REF#refs/tags/}"

          # 显示文件大小便于排查
          ls -lh "$DMG" "$SHA"

          # softprops/action-gh-release 会自动创建 release；切换到 gh CLI 后需要显式确保存在。
          # 两个 macOS matrix job 可能同时到达这里，因此 create 失败后再 view 一次处理竞态。
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG not found, creating draft release..."
            gh release create "$TAG" --draft --title "$TAG" --notes "" || gh release view "$TAG" >/dev/null
          fi

          # 重试上传，处理大文件 EPIPE 问题
          for attempt in 1 2 3; do
            echo "Upload attempt $attempt/3..."
            if gh release upload "$TAG" "$DMG" "$SHA" --clobber; then
              echo "Upload succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Upload failed after 3 attempts"
              exit 1
            fi
            echo "Upload failed, retrying in 10s..."
            sleep 10
          done
