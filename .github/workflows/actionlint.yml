name: Workflow Lint

on:
  push:
    branches: ['v*', 'ci_test']
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    branches: ['master', 'dev', 'ci_test', 'v*']
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: 'Actionlint'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: false

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@latest

      - name: Run actionlint
        run: actionlint
