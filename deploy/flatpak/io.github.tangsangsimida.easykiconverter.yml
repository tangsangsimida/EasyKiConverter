app-id: io.github.tangsangsimida.easykiconverter
runtime: org.kde.Platform
runtime-version: '6.9'
sdk: org.kde.Sdk
command: easykiconverter
build-options:
  append-path: /usr/lib/sdk/rsvg-2.54/bin
  append-ld-library-path: /usr/lib/sdk/rsvg-2.54/lib
# Use xdg-documents and xdg-download for user data access
# These are more granular than --filesystem=home
# Users can export converted KiCad library files to these directories
# Flatpak's file dialog will grant temporary access to other directories
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

modules:
  - name: qxlsx
    buildsystem: cmake-ninja
    builddir: true
    subdir: QXlsx
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DBUILD_SHARED_LIBS=OFF
      - -DBUILD_EXAMPLES=OFF
    post-install:
      - |
        # 复制所有头文件以确保编译成功
        cp -r ../header/* /app/include/QXlsxQt6/
        cp -r ../source/*.h /app/include/QXlsxQt6/ 2>/dev/null || true
    sources:
      - type: archive
        url: https://github.com/QtExcel/QXlsx/archive/refs/heads/master.zip
        sha256: 464005b533aefc2c96423dc0a4b238231b3d310a69881102d6430cb279b1701b
        strip-components: 1

  - name: easykiconverter
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_SYMBOL_FOOTPRINT_DEBUG_EXPORT=OFF
      - -DCMAKE_INSTALL_PREFIX=/app
      - -DCMAKE_PREFIX_PATH=/app
      - -DFLATPAK_BUILD=1
    sources:
      - type: git
        url: https://github.com/tangsangsimida/EasyKiConverter.git
        commit: c8267ad763884cf10a9485c2c0d226013a6ad8a8
    build-commands:
      - cmake --build . --parallel
      - cmake --install .
      - |
        # 验证可执行文件是否被安装
        if [ ! -f /app/bin/easykiconverter ]; then
          echo "ERROR: easykiconverter executable was not installed!"
          ls -la /app/bin/
          exit 1
        fi
        echo "easykiconverter executable installed successfully"
        ls -lh /app/bin/easykiconverter
    post-install:
      - |
        # 安装许可证文件
        install -Dm0644 /run/build/easykiconverter/LICENSE -t ${FLATPAK_DEST}/share/licenses/io.github.tangsangsimida.easykiconverter
      - |
        # 安装 AppStream 元数据
        install -Dm0644 /run/build/easykiconverter/deploy/metainfo/io.github.tangsangsimida.easykiconverter.metainfo.xml -t ${FLATPAK_DEST}/share/metainfo/
      - |
        # 创建 desktop 文件（支持多语言）
        mkdir -p /app/share/applications
        cat > /app/share/applications/io.github.tangsangsimida.easykiconverter.desktop <<EOF
        [Desktop Entry]
        Type=Application
        Name=EasyKiConverter
        Name[zh_CN]=EasyKiConverter
        Comment=Convert LCSC and EasyEDA components to KiCad libraries
        Comment[zh_CN]=将嘉立创和 EasyEDA 元件转换为 KiCad 库
        Exec=easykiconverter
        Icon=io.github.tangsangsimida.easykiconverter
        Categories=Development;Electronics;
        Terminal=false
        Keywords=KiCad;LCSC;EasyEDA;Component;Converter;Electronics;
        EOF

        # 安装多尺寸图标（Flathub 规范要求 16x16 到 512x512）
        mkdir -p /app/share/icons/hicolor
        for size in 16 32 48 64 128 256 512; do
          mkdir -p /app/share/icons/hicolor/${size}x${size}/apps
          if [ -f "/run/build/easykiconverter/resources/icons/app_icon.svg" ]; then
            rsvg-convert -w $size -h $size /run/build/easykiconverter/resources/icons/app_icon.svg \
              > /app/share/icons/hicolor/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png
          elif [ -f "/run/build/easykiconverter/resources/icons/app_icon.png" ]; then
            cp /run/build/easykiconverter/resources/icons/app_icon.png /app/share/icons/hicolor/${size}x${size}/apps/io.github.tangsangsimida.easykiconverter.png
          fi
        done

        # 更新图标缓存
        if command -v gtk-update-icon-cache &> /dev/null; then
          gtk-update-icon-cache -f -t /app/share/icons/hicolor || true
        fi

        # 更新桌面数据库
        update-desktop-database /app/share/applications || true